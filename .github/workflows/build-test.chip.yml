# This workflow executes testing of matter.js using CHIP certification (and other) tests.  It also handles building of
# new images if necessary.
#
# TODO - need secrets in nightly job to update CHIP SHA
#
#   * It automatically runs each night at midnight UTC
#
#   * It will build a new image if:
#
#     * The head commit message includes [rebuild-chip] (works on both push and pull_request)
#
#     * A PR modifies the workflow file or files under matter.js/chip change
#
#     * Run as part of the nightly job
#
#   * It runs CHIP tests.  If a new image was built, it tests that image.  Otherwise it tests the latest image in the
#     registry
#
#   * It publishes the new image (and PRs the new CHIP SHA) only on the nightly/manual jobs.  Builds triggered by a
#     push or pull_request are test-only and never published.

name: CHIP Image - Build and Test

on:
  schedule:
    - cron: 0 0 * * * # Every day at 00:00 (midnight)
  workflow_dispatch: # Manually on demand
    inputs:
      updateChipSha:
        description: 'Update SHA'
        required: true
        default: true
        type: boolean
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}-chip-build-test
  cancel-in-progress: true

jobs:
  # Determine whether we should run and/or build new CHIP container
  workflow-conditions:
    runs-on: ubuntu-latest
    if: github.repository == 'matter-js/matter.js' || github.repository == 'lauckhart/matter.js'
    outputs:
      build-needed: ${{ steps.check-rebuild.outputs.build-needed }}
      controllers: ${{ steps.controllers.outputs.controllers }}
      rebuild-marker: ${{ steps.marker.outputs.present }}
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          base: main
          filters: |
            src:
              - "support/chip/**"

      # head_commit is only populated on push events, so the marker would never match on pull_request.  Scan the PR's
      # commit messages (so any commit in the PR may carry the marker), and the head commit message on push.
      - name: Detect rebuild marker
        id: marker
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -n "$PR_BASE_SHA" ]; then
            msg="$(git log --format=%B "$PR_BASE_SHA".."$PR_HEAD_SHA")"
          else
            msg="$PUSH_MSG"
          fi
          if printf '%s' "$msg" | grep -qF '[rebuild-chip]'; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker rebuild needed
        if: >-
              github.event_name == 'schedule' ||
              (
                (github.event_name == 'push' || github.event_name == 'pull_request') &&
                steps.changes.outputs.src == 'true'
              ) ||
              github.event_name == 'workflow_dispatch'||
              steps.marker.outputs.present == 'true'
        id: check-rebuild
        run: echo "build-needed=true" >> $GITHUB_OUTPUT

      # Run the additional matter.js WebSocket controller variant on scheduled/manual runs and whenever CHIP image
      # files change; otherwise stick to chiptool only to keep PR cycles fast
      - name: Determine controllers to test
        id: controllers
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.changes.outputs.src }}" = "true" ]; then
            echo 'controllers=["chiptool","matterjs"]' >> $GITHUB_OUTPUT
          else
            echo 'controllers=["chiptool"]' >> $GITHUB_OUTPUT
          fi

  # Build the CHIP container if necessary
  chip-image:
    needs: workflow-conditions
    runs-on: ubuntu-latest
    outputs:
      source: ${{ needs.workflow-conditions.outputs.build-needed == 'true' && 'artifact' || 'repository' }}
      chip-sha: ${{ steps.get-sha.outputs.chip-sha }}
    steps:
      - name: Check out matter.js
        if: needs.workflow-conditions.outputs.build-needed == 'true'
        uses: actions/checkout@v7

      # A [rebuild-chip] rebuild exists to test against the current CHIP master, so refresh the SHA before building.
      # The resulting sha.txt is used only for this run's build; it is never committed on push/pull_request (see
      # publish-image), so no SHA bump leaks into the PR.
      - name: Increment CHIP SHA
        id: increment-sha
        if: >-
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.updateChipSha) ||
          needs.workflow-conditions.outputs.rebuild-marker == 'true'
        run: |
          cd support/chip
          ./bin/update-version

      - name: Get CHIP SHA
        id: get-sha
        if: >-
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          needs.workflow-conditions.outputs.rebuild-marker == 'true'
        run: |
          cd support/chip
          echo chip-sha=$(cat sha.txt) >> $GITHUB_OUTPUT

      - name: Build chip image
        if: needs.workflow-conditions.outputs.build-needed == 'true'
        run: |
          cd support/chip
          ./bin/build chip-artifact

      - name: Upload chip artifact
        if: needs.workflow-conditions.outputs.build-needed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: chip-image
          path: /tmp/chip.tar

  test-core:
    needs: [workflow-conditions, chip-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        controller: ${{ fromJson(needs.workflow-conditions.outputs.controllers) }}
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7

      - uses: ./.github/actions/run-chip-tests
        with:
          image-source: ${{ needs.chip-image.outputs.source }}
          test-group: core
          use-local-controller: ${{ matrix.controller == 'matterjs' }}

  test-app-fast:
    needs: [workflow-conditions, chip-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        controller: ${{ fromJson(needs.workflow-conditions.outputs.controllers) }}
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7

      - uses: ./.github/actions/run-chip-tests
        with:
          image-source: ${{ needs.chip-image.outputs.source }}
          test-group: app-fast
          use-local-controller: ${{ matrix.controller == 'matterjs' }}

  test-app-slow:
    needs: [workflow-conditions, chip-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        controller: ${{ fromJson(needs.workflow-conditions.outputs.controllers) }}
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7

      - uses: ./.github/actions/run-chip-tests
        with:
          image-source: ${{ needs.chip-image.outputs.source }}
          test-group: app-slow
          use-local-controller: ${{ matrix.controller == 'matterjs' }}

  test-app-cc-1:
    needs: [workflow-conditions, chip-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        controller: ${{ fromJson(needs.workflow-conditions.outputs.controllers) }}
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7

      - uses: ./.github/actions/run-chip-tests
        with:
          image-source: ${{ needs.chip-image.outputs.source }}
          test-group: app-cc-1
          use-local-controller: ${{ matrix.controller == 'matterjs' }}

  test-app-cc-2:
    needs: [workflow-conditions, chip-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        controller: ${{ fromJson(needs.workflow-conditions.outputs.controllers) }}
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7

      - uses: ./.github/actions/run-chip-tests
        with:
          image-source: ${{ needs.chip-image.outputs.source }}
          test-group: app-cc-2
          use-local-controller: ${{ matrix.controller == 'matterjs' }}

  test-icd:
    needs: [workflow-conditions, chip-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        controller: ${{ fromJson(needs.workflow-conditions.outputs.controllers) }}
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7

      - uses: ./.github/actions/run-chip-tests
        with:
          image-source: ${{ needs.chip-image.outputs.source }}
          test-group: icd
          use-local-controller: ${{ matrix.controller == 'matterjs' }}

  # Publish if this is nightly run or triggered manually
  # TODO - create PR to commit SHA from chip-image action?
  publish-image:
    name: Publish docker image
    runs-on: ubuntu-latest
    needs: [
      chip-image,
      test-core,
      test-app-fast,
      test-app-slow,
      test-app-cc-1,
      test-app-cc-2,
      test-icd
    ]
    if: >-
      needs.chip-image.outputs.source == 'artifact' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Check out matter.js
        uses: actions/checkout@v7

      - name: Login to GitHub Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: Automator77
          password: ${{ secrets.MATTERJS_DOCKER_TOKEN }}

      - name: Load image from artifact
        uses: ./.github/actions/load-chip

      - name: Sync CHIP SHA with built version
        env:
          CHIP_SHA: ${{ needs.chip-image.outputs.chip-sha }}
        run: |
          cd support/chip
          echo "$CHIP_SHA" > sha.txt

      - name: Publish docker image
        run: |
          cd support/chip
          ./bin/info
          ./bin/publish

      # TODO - right now we PR the CHIP SHA after publishing container.  Not exactly correct but it's not a big deal if
      # the SHA somehow doesn't get committed.  To fix we will need to figure out how to load the tar artifact from this
      # workflow in the PR workflow
      - name: PR new CHIP SHA
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PR_TOKEN }}
          commit-message: "[CHIP BUILD] ${{ needs.chip-image.outputs.chip-sha }}"
          committer: Automator77 <github-automation@fischer-ka.de>
          author: Automator77 <github-automation@fischer-ka.de>
          signoff: false
          branch: chip-image
          delete-branch: true
          title: "[CHIP BUILD] ${{ needs.chip-image.outputs.chip-sha }}"
          body: |
            New CHIP SHA from CI container build
          labels: |
            automated-chip-image-release
          assignees: Automator77
          draft: false
